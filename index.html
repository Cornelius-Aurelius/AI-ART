<style>
:root {

}
*{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;

}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  background-image:
    linear-gradient(rgba(0,234,255,.04) 1px,transparent 1px),

  gap:14px;
  background:rgba(0,0,0,.7);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(16px);
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(0,234,255,.2),rgba(255,0,255,.18));border:1px solid var(--line-strong);box-shadow:0 0 28px rgba(0,234,255,.16);font-weight:900;color:var(--cyan)}
.brand-text{min-width:0}.brand-title{display:block;font-weight:900;letter-spacing:.06em;color:var(--cyan);font-size:clamp(13px,3.3vw,18px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand-sub{display:block;color:var(--muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu{position:relative;flex:0 0 auto}.menu summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;min-height:42px;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--text);font-weight:900;box-shadow:0 14px 34px rgba(0,0,0,.22)}.menu summary::-webkit-details-marker{display:none}.menu[open] summary,.menu summary:hover{border-color:var(--line-strong);background:rgba(0,234,255,.1)}.chev{color:var(--cyan);transition:.18s}.menu[open] .chev{transform:rotate(180deg)}
.menu-panel{position:absolute;right:0;top:calc(100% + 10px);width:min(280px,calc(100vw - 24px));padding:10px;border:1px solid var(--line-strong);border-radius:20px;background:rgba(1,5,13,.96);box-shadow:var(--shadow);max-height:calc(100vh - 90px);overflow:auto}.menu-panel a{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);color:var(--text);font-weight:900;margin-bottom:8px}.menu-panel a:last-child{margin-bottom:0}.menu-panel a:hover,.menu-panel a:focus-visible{outline:none;background:rgba(0,234,255,.12);border-color:var(--line-strong)}.menu-panel small{color:var(--muted);font-weight:700}

.progress-track{position:sticky;top:68px;z-index:999;height:3px;background:rgba(255,255,255,.06)}#progressBar{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--green),var(--pink));transition:width .25s ease}
.hero{padding:clamp(38px,8vw,86px) 16px 34px;text-align:center}.hero h1{margin:0 auto;font-size:clamp(42px,11vw,96px);line-height:.88;letter-spacing:-.07em;max-width:980px;background:linear-gradient(90deg,#ff00ff,#00eaff,#b3ff00,#ff6a00,#ff00ff);background-size:420%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 9s linear infinite}.hero .subtitle{margin:14px auto 0;font-size:clamp(18px,5vw,34px);letter-spacing:.22em;color:var(--cyan);font-weight:900}.hero p{max-width:780px;margin:18px auto 0;color:var(--muted);font-size:clamp(15px,3.6vw,19px);line-height:1.65}.hero-stats{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:22px auto 0}.pill{display:inline-flex;align-items:center;gap:7px;padding:9px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.045);color:var(--muted);font-size:13px;font-weight:800}
@keyframes shine{0%{background-position:0% 50%}100%{background-position:420% 50%}}

.gallery-shell{padding:14px clamp(10px,3.4vw,34px) 34px}.grid{columns:4 250px;column-gap:clamp(12px,2.4vw,28px);max-width:1680px;margin:0 auto}.item{break-inside:avoid;margin:0 0 clamp(12px,2.4vw,28px);content-visibility:auto;contain-intrinsic-size:360px 640px}.frame{width:100%;aspect-ratio:9/16;border-radius:clamp(16px,3vw,26px);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid var(--line);box-shadow:0 0 20px rgba(0,234,255,.12);overflow:hidden;display:flex;align-items:center;justify-content:center;transition:.22s ease}.item:hover .frame{transform:translateY(-4px);box-shadow:0 0 30px rgba(0,234,255,.32);border-color:var(--line-strong)}.frame img{width:100%;height:100%;object-fit:contain;border-radius:inherit;display:block;background:rgba(0,0,0,.18);cursor:zoom-in}.load-more-wrap{display:flex;justify-content:center;margin:10px auto 60px}.load-more{min-height:46px;padding:12px 18px;border-radius:999px;border:1px solid var(--line);background:rgba(0,234,255,.1);color:var(--text);font-weight:900;cursor:pointer}.load-more:hover{border-color:var(--line-strong);background:rgba(0,234,255,.16)}

#viewer{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.94);backdrop-filter:blur(14px);align-items:center;justify-content:center;padding:70px 16px 30px}#viewer.open{display:flex}#viewerImg{max-width:100%;max-height:100%;border-radius:20px;box-shadow:0 0 40px rgba(0,234,255,.34);object-fit:contain}.viewer-btn{position:absolute;border:1px solid var(--line);background:rgba(0,0,0,.55);color:var(--cyan);border-radius:16px;cursor:pointer;display:grid;place-items:center}.viewer-btn:hover{color:var(--pink);border-color:var(--line-strong)}#viewerClose{top:16px;right:16px;width:50px;height:50px;font-size:36px}.navArrow{top:50%;transform:translateY(-50%);width:50px;height:70px;font-size:42px}#leftArrow{left:16px}#rightArrow{right:16px}
footer{text-align:center;padding:36px 16px 54px;color:var(--muted);font-size:14px;border-top:1px solid var(--line);background:rgba(0,0,0,.22)}footer strong{color:var(--cyan)}
@media(max-width:640px){.site-nav{min-height:62px}.progress-track{top:62px}.brand-mark{width:38px;height:38px}.brand-sub{display:none}.menu summary{min-height:40px;padding:9px 12px}.hero{padding-top:34px}.hero .subtitle{letter-spacing:.15em}.grid{columns:2 150px;column-gap:10px}.item{margin-bottom:10px}.gallery-shell{padding-left:10px;padding-right:10px}.navArrow{width:42px;height:58px;font-size:34px}#leftArrow{left:8px}#rightArrow{right:8px}#viewer{padding-left:54px;padding-right:54px}}
@media(max-width:420px){.grid{columns:1 220px}.brand-title{font-size:12px}.hero h1{font-size:40px}.hero .subtitle{font-size:18px}.pill{font-size:12px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>

<body>
<a class="skip-link" href="#gallery">Skip to AI art gallery</a>

<nav class="site-nav" aria-label="Main navigation">
  <a class="brand" href="#gallery" aria-label="Cornelius Aurelius AI Art gallery">
    <span class="brand-mark">AI</span>
    <span class="brand-text">
      <span class="brand-title">CORNELIUS AURELIUS</span>
      <span class="brand-sub">Official AI Art Gallery</span>
    </span>
  </a>

  <details class="menu" id="siteMenu">
    <summary aria-label="Open menu"><span>Menu</span><span class="chev" aria-hidden="true">⌄</span></summary>
    <div class="menu-panel" role="navigation" aria-label="Dropdown menu">
      <a href="https://corneliusaurelius.com/" target="_blank" rel="noopener">Home <small>corneliusaurelius.com</small></a>
      <a href="https://buy.stripe.com/28E00jbRIfz8aLI7TGco000" target="_blank" rel="noopener">Tip Cornelius <small>support the creator</small></a>
    </div>
  </details>
</nav>

<div class="progress-track" aria-hidden="true"><div id="progressBar"></div></div>

<h1 class="sr-only" id="top">Cornelius Aurelius AI Art Gallery</h1>

<main id="gallery" class="gallery-shell" aria-label="Cornelius Aurelius AI art gallery">
  <div class="grid" id="galleryGrid"></div>
  <div class="load-more-wrap"><button class="load-more" id="loadMore" type="button">Load more AI art</button></div>
</main>

<div id="viewer" aria-modal="true" role="dialog" aria-label="Image viewer">
  <button id="viewerClose" class="viewer-btn" type="button" aria-label="Close image viewer">×</button>
  <button id="leftArrow" class="viewer-btn navArrow" type="button" aria-label="Previous image">‹</button>
  <img id="viewerImg" alt="Cornelius Aurelius AI artwork enlarged view" />
  <button id="rightArrow" class="viewer-btn navArrow" type="button" aria-label="Next image">›</button>
</div>

<footer>
  <strong>Cornelius Aurelius AI Art</strong><br />Cornelius Aurelius 2026.
</footer>

<script>
const TOTAL_IMAGES = 253;
const baseURL = "./";
const gallery = document.getElementById("galleryGrid");
const loadMoreButton = document.getElementById("loadMore");
const bar = document.getElementById("progressBar");
const siteMenu = document.getElementById("siteMenu");
let rendered = 0;
let loaded = 0;
let currentIndex = 1;
const batchSize = window.matchMedia("(max-width: 640px)").matches ? 12 : 24;

function updateProgress() {
  loaded += 1;
  bar.style.width = Math.min(100, (loaded / TOTAL_IMAGES) * 100) + "%";
}

function makeItem(i) {
  const item = document.createElement("div");
  item.className = "item";
  const frame = document.createElement("div");
  frame.className = "frame";
  const img = document.createElement("img");
  img.src = `${baseURL}${i}.png`;
  img.alt = `Cornelius Aurelius AI artwork ${i}`;
  img.width = 1080;
  img.height = 1920;
  img.loading = i <= 4 ? "eager" : "lazy";
  img.decoding = "async";
  if (i <= 2) img.fetchPriority = "high";
  img.addEventListener("load", updateProgress, { once: true });
  img.addEventListener("click", () => openViewer(i));
  frame.appendChild(img);
  item.appendChild(frame);
  return item;
}

function renderNextBatch() {
  const fragment = document.createDocumentFragment();
  const end = Math.min(TOTAL_IMAGES, rendered + batchSize);
  for (let i = rendered + 1; i <= end; i++) fragment.appendChild(makeItem(i));
  rendered = end;
  gallery.appendChild(fragment);
  if (rendered >= TOTAL_IMAGES) loadMoreButton.style.display = "none";
}

loadMoreButton.addEventListener("click", renderNextBatch);

const sentinelObserver = "IntersectionObserver" in window ? new IntersectionObserver(entries => {
  if (entries.some(entry => entry.isIntersecting)) renderNextBatch();
}, { rootMargin: "900px" }) : null;
if (sentinelObserver) sentinelObserver.observe(loadMoreButton);

function openViewer(i) {
  currentIndex = i;
  document.getElementById("viewerImg").src = `${baseURL}${i}.png`;
  document.getElementById("viewer").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeViewer() {
  document.getElementById("viewer").classList.remove("open");
  document.body.style.overflow = "";
}
function previousImage() { openViewer(currentIndex <= 1 ? TOTAL_IMAGES : currentIndex - 1); }
function nextImage() { openViewer(currentIndex >= TOTAL_IMAGES ? 1 : currentIndex + 1); }

document.getElementById("viewerClose").addEventListener("click", closeViewer);
document.getElementById("leftArrow").addEventListener("click", previousImage);
document.getElementById("rightArrow").addEventListener("click", nextImage);
document.getElementById("viewer").addEventListener("click", event => { if (event.target.id === "viewer") closeViewer(); });
document.addEventListener("keydown", event => {
  if (!document.getElementById("viewer").classList.contains("open")) return;
  if (event.key === "Escape") closeViewer();
  if (event.key === "ArrowLeft") previousImage();
  if (event.key === "ArrowRight") nextImage();
});
let startX = 0;
document.getElementById("viewer").addEventListener("touchstart", event => startX = event.touches[0].clientX, { passive: true });
document.getElementById("viewer").addEventListener("touchend", event => {
  const diff = event.changedTouches[0].clientX - startX;
  if (diff > 50) previousImage();
  if (diff < -50) nextImage();
}, { passive: true });

document.addEventListener("click", event => {
  if (siteMenu.open && !siteMenu.contains(event.target)) siteMenu.open = false;
});

renderNextBatch();
</script>
